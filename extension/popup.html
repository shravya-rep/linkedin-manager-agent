<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 300px;
      background: #fff;
      color: #1d1d1d;
    }

    .header {
      background: #0a66c2;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header span { font-size: 11px; opacity: 0.8; }

    .section { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; }
    .section h2 { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    /* Stats bar */
    .stats { display: flex; gap: 0; }
    .stat {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      border-radius: 6px;
      background: #f3f2ef;
      margin: 0 3px;
    }
    .stat-num { font-size: 20px; font-weight: 700; color: #0a66c2; }
    .stat-label { font-size: 10px; color: #666; margin-top: 2px; }

    /* Onboarding */
    .onboarding-msg {
      font-size: 13px;
      color: #333;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    /* Continue banner */
    .continue-banner {
      background: #f0f7ff;
      border: 1px solid #cce0ff;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #004182;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .continue-banner span { flex: 1; }

    /* Block list */
    .block-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #f8f8f8;
    }
    .block-item:last-child { border-bottom: none; }
    .block-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #0a66c2; cursor: pointer; }
    .block-item label { flex: 1; cursor: pointer; color: #333; }
    .block-item .emoji { font-size: 15px; width: 20px; text-align: center; }

    /* Custom patterns */
    .custom-patterns { margin-top: 8px; }
    .custom-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fee;
      color: #c0392b;
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 11px;
      margin: 2px;
    }
    .custom-tag button {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary { background: #0a66c2; color: #fff; }
    .btn-primary:hover { background: #004182; }
    .btn-secondary { background: #f3f2ef; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }

    /* Digest */
    .digest-section { padding: 14px 16px; }
    .digest-btn {
      width: 100%;
      padding: 10px;
      background: #f0f7ff;
      border: 1px solid #0a66c2;
      border-radius: 6px;
      color: #0a66c2;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .digest-btn:hover { background: #e0efff; }

    .mental-health-stat {
      font-size: 12px;
      color: #27ae60;
      font-weight: 600;
      text-align: center;
      margin-top: 8px;
    }

    .hidden { display: none; }

    /* Current filters display */
    .filter-tag {
      display: inline-block;
      background: #fff0f0;
      color: #c0392b;
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 11px;
      margin: 2px;
      border: 1px solid #fcc;
    }
    .filter-tag.custom {
      background: #fff8e1;
      color: #e67e22;
      border-color: #ffe0a0;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>LinkLens ✦</h1>
  <span id="status-text">Active</span>
</div>

<!-- Stats -->
<div class="section">
  <h2>Today's feed</h2>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Seen</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-hidden" style="color:#999">0</div>
      <div class="stat-label">Hidden</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-signal" style="color:#27ae60">0</div>
      <div class="stat-label">Signal</div>
    </div>
  </div>
  <div class="mental-health-stat" id="mh-stat" style="display:none"></div>
</div>

<!-- Onboarding (first visit) -->
<div class="section" id="onboarding-section">
  <p class="onboarding-msg">Shield your feed. Select what you <strong>never</strong> want to see:</p>
  <div id="block-list"></div>
  <button class="btn btn-primary" id="save-btn">Save & Start Filtering</button>
</div>

<!-- Return visit -->
<div class="section hidden" id="return-section">
  <h2>Currently blocking</h2>
  <div id="current-filters" style="margin-bottom:10px"></div>
  <button class="btn btn-secondary" id="edit-btn">Edit filters</button>
</div>

<!-- Digest -->
<div class="digest-section">
  <button class="digest-btn" id="digest-btn">Show today's digest ✦</button>
</div>

<script src="popup.js"></script>
</body>
</html>
